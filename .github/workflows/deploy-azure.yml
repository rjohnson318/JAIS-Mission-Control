name: Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-azure
  cancel-in-progress: false

env:
  IMAGE_NAME: mission-control

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ secrets.AZURE_RESOURCE_GROUP }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment health
        run: |
          echo "Waiting for app to become healthy..."
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net/api/status || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is healthy (HTTP $STATUS)"
              exit 0
            fi
            echo "  Attempt $i/15 — got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "⚠️ App did not become healthy within 2.5 minutes"
          exit 1
